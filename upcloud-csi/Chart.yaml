apiVersion: v2
name: upcloud-csi
description: UpCloud CSI block-storage driver for Kubernetes (vendored from upstream v1.4.0) with snapshot backup CronJob, multi-zone StorageClasses, Prometheus alerts & Grafana dashboard.
type: application
version: 0.3.1
appVersion: "v1.4.0"
kubeVersion: ">=1.27.0-0"
icon: https://ankra.io/images/apple-touch-icon.png

home: https://github.com/ankraio/ankra-charts/tree/main/upcloud-csi
sources:
  - https://github.com/ankraio/ankra-charts/tree/main/upcloud-csi
  - https://github.com/UpCloudLtd/upcloud-csi

keywords:
  - upcloud
  - csi
  - storage
  - block-storage
  - persistent-volumes
  - snapshots
  - backup
  - observability
  - prometheus
  - grafana
  - k3s

maintainers:
  - name: Ankra AB
    email: admin@ankra.io
    url: https://ankra.io

annotations:
  category: Storage
  licenses: Apache-2.0
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: storage
  artifacthub.io/prerelease: "false"
  artifacthub.io/maintainers: |
    - name: Ankra AB
      email: admin@ankra.io
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/ankraio/ankra-charts
    - name: Helm repo (helm repo add)
      url: https://ankraio.github.io/ankra-charts
    - name: Upstream project
      url: https://github.com/UpCloudLtd/upcloud-csi
    - name: Upstream image (GHCR)
      url: https://ghcr.io/upcloudltd/upcloud-csi
    - name: Chart (OCI)
      url: oci://ghcr.io/ankraio/ankra-charts/upcloud-csi
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/ankra-charts/upcloud-ccm
  artifacthub.io/operator: "false"
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/images: |
    - name: upcloud-csi
      image: ghcr.io/upcloudltd/upcloud-csi:v1.4.0
    - name: csi-provisioner
      image: registry.k8s.io/sig-storage/csi-provisioner:v3.1.0
    - name: csi-attacher
      image: registry.k8s.io/sig-storage/csi-attacher:v3.4.0
    - name: csi-resizer
      image: registry.k8s.io/sig-storage/csi-resizer:v1.4.0
    - name: csi-snapshotter
      image: registry.k8s.io/sig-storage/csi-snapshotter:v4.2.1
    - name: snapshot-controller
      image: registry.k8s.io/sig-storage/snapshot-controller:v4.2.1
    - name: csi-node-driver-registrar
      image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.5.0
    - name: snapshot-validation-webhook
      image: registry.k8s.io/sig-storage/snapshot-validation-webhook:v4.2.1
    - name: kubectl
      image: registry.k8s.io/kubectl:v1.31.0
    - name: busybox-test-hook
      image: registry.k8s.io/e2e-test-images/busybox:1.36.1-1
      whitelisted: true
  artifacthub.io/changes: |
    - kind: fixed
      description: "CSI controller and snapshot controller are now schedulable on k3s: control-plane pinning uses nodeAffinity Exists instead of an exact-match nodeSelector of node-role.kubernetes.io/control-plane='' (which never matches the k3s label value 'true', leaving both pods permanently Pending so no PersistentVolumeClaim could ever be provisioned)."
