apiVersion: v2
name: upcloud-csi
description: UpCloud CSI block-storage driver for Kubernetes (vendored from upstream v1.4.0) with snapshot backup CronJob, multi-zone StorageClasses, Prometheus alerts & Grafana dashboard.
type: application
version: 0.2.0
appVersion: "v1.4.0"
kubeVersion: ">=1.27.0-0"

home: https://github.com/ankraio/ankra-charts/tree/main/upcloud-csi
sources:
  - https://github.com/ankraio/ankra-charts/tree/main/upcloud-csi
  - https://github.com/UpCloudLtd/upcloud-csi

keywords:
  - upcloud
  - csi
  - storage
  - block-storage
  - persistent-volumes
  - snapshots
  - backup
  - observability
  - prometheus
  - grafana
  - k3s

maintainers:
  - name: Ankra AB
    email: admin@ankra.io
    url: https://ankra.io

annotations:
  category: Storage
  licenses: Apache-2.0
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: storage
  artifacthub.io/prerelease: "false"
  artifacthub.io/maintainers: |
    - name: Ankra AB
      email: admin@ankra.io
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/ankraio/ankra-charts
    - name: Upstream project
      url: https://github.com/UpCloudLtd/upcloud-csi
    - name: Upstream image (GHCR)
      url: https://ghcr.io/upcloudltd/upcloud-csi
    - name: Chart (OCI)
      url: oci://ghcr.io/ankraio/ankra-charts/upcloud-csi
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/ankra-charts/upcloud-ccm
  artifacthub.io/operator: "false"
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/images: |
    - name: upcloud-csi
      image: ghcr.io/upcloudltd/upcloud-csi:v1.4.0
    - name: csi-provisioner
      image: registry.k8s.io/sig-storage/csi-provisioner:v3.1.0
    - name: csi-attacher
      image: registry.k8s.io/sig-storage/csi-attacher:v3.4.0
    - name: csi-resizer
      image: registry.k8s.io/sig-storage/csi-resizer:v1.4.0
    - name: csi-snapshotter
      image: registry.k8s.io/sig-storage/csi-snapshotter:v4.2.1
    - name: snapshot-controller
      image: registry.k8s.io/sig-storage/snapshot-controller:v4.2.1
    - name: csi-node-driver-registrar
      image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.5.0
  artifacthub.io/changes: |
    - kind: added
      description: PrometheusRule with recommended alerts (controller down, node DS missing, PVC pending, snapshot controller down, near-full volumes, crash loop).
    - kind: added
      description: PodMonitor for the csi-upcloud-plugin metrics endpoint.
    - kind: added
      description: Grafana dashboard ConfigMap with sidecar-discovery label.
    - kind: added
      description: Second VolumeSnapshotClass with `deletionPolicy: Retain` (snapshotClasses.retain.enabled).
    - kind: added
      description: Opt-in periodic VolumeSnapshot CronJob with namespace/PVC label selectors and retention rotation.
    - kind: added
      description: StorageClass `allowedTopologies`, `mountOptions`, per-tier `reclaimPolicy`/`volumeBindingMode` overrides.
    - kind: added
      description: helm test hook that provisions a PVC, mounts it, and writes random data end-to-end.
    - kind: added
      description: hostAliases, dnsConfig, runtimeClassName, schedulerName, fsGroupChangePolicy and terminationMessagePolicy across the pod spec.
    - kind: added
      description: New values-examples/observability.yaml and values-examples/multi-zone.yaml overlays.
    - kind: changed
      description: .helmignore anchors `tests/` / `values-examples/` / `vendor/` / `CHANGELOG.md` to the chart root so `templates/tests/` ships in the package.
