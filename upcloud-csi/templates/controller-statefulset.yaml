{{- include "upcloud-csi.validate" . -}}
{{/*
csi-upcloud-controller StatefulSet — vendored from UpCloud CSI v1.4.0
setup-upcloud-csi.yaml. Image references and pod-level defaults are
exposed via values; sidecar args (csi-address, timeouts, leader-election)
are preserved verbatim from upstream.
*/}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "upcloud-csi.fullname" . }}-controller
  namespace: {{ include "upcloud-csi.namespace" . }}
  labels:
    {{- include "upcloud-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
  {{- with (include "upcloud-csi.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  serviceName: {{ include "upcloud-csi.fullname" . }}-controller
  replicas: {{ .Values.controller.replicaCount }}
  revisionHistoryLimit: {{ .Values.controller.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "upcloud-csi.controllerSelectorLabels" . | nindent 6 }}
  updateStrategy:
    {{- toYaml .Values.controller.updateStrategy | nindent 4 }}
  template:
    metadata:
      annotations:
        {{- if .Values.credentials.create }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.controller.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "upcloud-csi.controllerSelectorLabels" . | nindent 8 }}
        role: csi-upcloud
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "upcloud-csi.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ .Values.serviceAccount.controllerName }}
      automountServiceAccountToken: true
      priorityClassName: {{ .Values.controller.priorityClassName }}
      {{- with .Values.runtimeClassName }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- with .Values.schedulerName }}
      schedulerName: {{ . }}
      {{- end }}
      dnsPolicy: {{ .Values.controller.dnsPolicy }}
      {{- with .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.controller.terminationGracePeriodSeconds }}
      securityContext:
        {{- $psc := deepCopy .Values.controller.podSecurityContext -}}
        {{- if .Values.fsGroupChangePolicy }}{{- $_ := set $psc "fsGroupChangePolicy" .Values.fsGroupChangePolicy }}{{- end }}
        {{- toYaml $psc | nindent 8 }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: csi-provisioner
          image: {{ include "upcloud-csi.image" (dict "image" .Values.images.provisioner "context" .) }}
          imagePullPolicy: {{ .Values.images.provisioner.pullPolicy }}
          terminationMessagePolicy: {{ .Values.terminationMessagePolicy }}
          args:
            - "--csi-address=$(ADDRESS)"
            - "--v={{ .Values.controller.logVerbosity }}"
            - "--timeout=600s"
            - "--leader-election=true"
            {{- if .Values.metrics.podMonitor.enabled }}
            - "--http-endpoint=:{{ .Values.metrics.port }}"
            - "--metrics-path=/metrics"
            {{- end }}
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          {{- if .Values.metrics.podMonitor.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- end }}
          securityContext:
            {{- toYaml .Values.controller.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.controller.resources.sidecar | nindent 12 }}
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
        - name: csi-attacher
          image: {{ include "upcloud-csi.image" (dict "image" .Values.images.attacher "context" .) }}
          imagePullPolicy: {{ .Values.images.attacher.pullPolicy }}
          terminationMessagePolicy: {{ .Values.terminationMessagePolicy }}
          args:
            - "--v={{ .Values.controller.logVerbosity }}"
            - "--csi-address=$(ADDRESS)"
            - "--timeout=600s"
            - "--leader-election=true"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          securityContext:
            {{- toYaml .Values.controller.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.controller.resources.sidecar | nindent 12 }}
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
        - name: csi-resizer
          image: {{ include "upcloud-csi.image" (dict "image" .Values.images.resizer "context" .) }}
          imagePullPolicy: {{ .Values.images.resizer.pullPolicy }}
          terminationMessagePolicy: {{ .Values.terminationMessagePolicy }}
          args:
            - "--v={{ .Values.controller.logVerbosity }}"
            - "--timeout=600s"
            - "--csi-address=$(ADDRESS)"
            - "--handle-volume-inuse-error=true"
            - "--leader-election=true"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          securityContext:
            {{- toYaml .Values.controller.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.controller.resources.sidecar | nindent 12 }}
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
        - name: csi-snapshotter
          image: {{ include "upcloud-csi.image" (dict "image" .Values.images.snapshotter "context" .) }}
          imagePullPolicy: {{ .Values.images.snapshotter.pullPolicy }}
          terminationMessagePolicy: {{ .Values.terminationMessagePolicy }}
          args:
            - "--csi-address=$(ADDRESS)"
            - "--v={{ .Values.controller.logVerbosity }}"
            - "--timeout=600s"
            {{- if gt (int .Values.controller.replicaCount) 1 }}
            - "--leader-election=true"
            {{- else }}
            - "--leader-election=false"
            {{- end }}
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          securityContext:
            {{- toYaml .Values.controller.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.controller.resources.sidecar | nindent 12 }}
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
        - name: csi-upcloud-plugin
          image: {{ include "upcloud-csi.image" (dict "image" .Values.images.csiDriver "context" .) }}
          imagePullPolicy: {{ .Values.images.csiDriver.pullPolicy }}
          terminationMessagePolicy: {{ .Values.terminationMessagePolicy }}
          args:
            - "--endpoint=$(CSI_ENDPOINT)"
            - "--nodehost=$(NODE_ID)"
            - "--mode=monolith"
            {{- with .Values.controller.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: CSI_ENDPOINT
              value: unix:///var/lib/csi/sockets/pluginproxy/csi.sock
            - name: UPCLOUD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "upcloud-csi.secretName" . }}
                  key: {{ .Values.credentials.usernameKey }}
            - name: UPCLOUD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "upcloud-csi.secretName" . }}
                  key: {{ .Values.credentials.passwordKey }}
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- with .Values.controller.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.controller.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.controller.resources.csiDriver | nindent 12 }}
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
      volumes:
        - name: socket-dir
          emptyDir: {}
