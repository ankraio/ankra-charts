{{- /*
PodMonitor — scrapes CSI operation metrics from the csi-provisioner sidecar on
the controller pods. The UpCloud CSI driver itself exposes no metrics endpoint,
so the provisioner sidecar (`--http-endpoint=:<metrics.port>`) is the source.
The sidecar port + container port are wired automatically when this is enabled.
*/ -}}
{{- if .Values.metrics.podMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "upcloud-csi.fullname" . }}
  namespace: {{ default (include "upcloud-csi.namespace" .) .Values.metrics.podMonitor.namespace }}
  labels:
    {{- include "upcloud-csi.labels" . | nindent 4 }}
    {{- with .Values.metrics.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: [{{ include "upcloud-csi.name" . }}]
      - key: app.kubernetes.io/component
        operator: In
        values: [controller]
  namespaceSelector:
    matchNames:
      - {{ include "upcloud-csi.namespace" . }}
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.metrics.podMonitor.interval }}
      scrapeTimeout: {{ .Values.metrics.podMonitor.scrapeTimeout }}
      {{- with .Values.metrics.podMonitor.relabelings }}
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.metrics.podMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
