suite: node daemonset
templates:
  - templates/node-daemonset.yaml
release:
  name: ut
  namespace: kube-system

tests:
  - it: renders a DaemonSet with 2 containers
    asserts:
      - isKind:
          of: DaemonSet
      - equal:
          path: metadata.name
          value: ut-upcloud-csi-node
      - lengthEqual:
          path: spec.template.spec.containers
          count: 2

  - it: csi-upcloud-plugin must be privileged for mount syscalls
    asserts:
      - equal:
          path: spec.template.spec.containers[1].securityContext.privileged
          value: true
      - contains:
          path: spec.template.spec.containers[1].securityContext.capabilities.add
          content: SYS_ADMIN

  - it: respects kubeletDir override (paths thread through)
    set:
      node.kubeletDir: /var/lib/rancher/k3s/agent/kubelet
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].env[1].value
          pattern: "^/var/lib/rancher/k3s/agent/kubelet/plugins/storage.csi.upcloud.com/csi.sock$"
      - matchRegex:
          path: spec.template.spec.volumes[2].hostPath.path
          pattern: "^/var/lib/rancher/k3s/agent/kubelet$"

  - it: "tolerates everything (default: operator Exists)"
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            operator: Exists

  - it: uses hostNetwork (needed for kubelet plugin discovery)
    asserts:
      - equal:
          path: spec.template.spec.hostNetwork
          value: true
      - equal:
          path: spec.template.spec.dnsPolicy
          value: ClusterFirstWithHostNet
