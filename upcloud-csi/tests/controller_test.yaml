suite: controller statefulset
templates:
  - templates/controller-statefulset.yaml
  - templates/secret.yaml
release:
  name: ut
  namespace: kube-system

tests:
  - it: renders a StatefulSet with 5 containers
    template: templates/controller-statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: ut-upcloud-csi-controller
      - lengthEqual:
          path: spec.template.spec.containers
          count: 5

  - it: defaults to reusing the upcloud-ccm Secret
    template: templates/controller-statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[4].env[1].valueFrom.secretKeyRef.name
          value: upcloud-ccm-credentials

  - it: creates a Secret when credentials.create=true and existingSecret=''
    template: templates/secret.yaml
    set:
      credentials.create: true
      credentials.existingSecret: ""
      credentials.username: u
      credentials.password: p
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: ut-upcloud-csi-credentials

  - it: honors global.imageRegistry
    template: templates/controller-statefulset.yaml
    set:
      global.imageRegistry: harbor.internal
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^harbor.internal/sig-storage/csi-provisioner:"
      - matchRegex:
          path: spec.template.spec.containers[4].image
          pattern: "^harbor.internal/upcloudltd/upcloud-csi:"

  - it: drops privileges everywhere in the controller pod
    template: templates/controller-statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
