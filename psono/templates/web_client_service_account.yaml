{{- if and .Values.webclient.enabled .Values.webclient.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "webclient.serviceAccountName" . }}
  labels:
    {{- include "webclient.labels" . | nindent 4 }}
  {{- with .Values.webclient.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
