suite: admin client deployment
templates:
  - templates/admin_client_deployment.yaml
  # Loaded for the checksum/config include; assertions target the deployment.
  - templates/admin_configmap.yaml
release:
  name: psono
set:
  base_url: https://psono.example.com
  domain: example.com
tests:
  - it: is disabled by default
    template: templates/admin_client_deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a Deployment when enabled
    template: templates/admin_client_deployment.yaml
    set:
      adminClient.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: psono-admin
      - equal:
          path: spec.template.spec.containers[0].name
          value: admin-client
      - matchRegex:
          path: spec.template.metadata.annotations["checksum/config"]
          pattern: ^[a-f0-9]{64}$

  - it: wires adminClient.replicas
    template: templates/admin_client_deployment.yaml
    set:
      adminClient.enabled: true
      adminClient.replicas: 2
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: renders adminClient.env entries
    template: templates/admin_client_deployment.yaml
    set:
      adminClient.enabled: true
      adminClient.env:
        SOME_FLAG: "yes"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SOME_FLAG
            value: "yes"
