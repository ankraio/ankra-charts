suite: ServiceAccount + RBAC gating
templates:
  - templates/serviceaccount.yaml
  - templates/clusterrolebinding.yaml
release:
  name: ut
  namespace: kube-system
set:
  ccmConfig.clusterID: t
  credentials.username: u
  credentials.password: p

tests:
  - it: creates SA + CRB by default (external-CCM setup)
    asserts:
      - hasDocuments:
          count: 1
        template: templates/serviceaccount.yaml
      - isKind:
          of: ServiceAccount
        template: templates/serviceaccount.yaml
      - hasDocuments:
          count: 1
        template: templates/clusterrolebinding.yaml
      - isKind:
          of: ClusterRoleBinding
        template: templates/clusterrolebinding.yaml

  - it: omits the SA when serviceAccount.create=false (cluster ships its own)
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0
        template: templates/serviceaccount.yaml

  - it: omits the ClusterRoleBinding when rbac.create=false (cluster ships CCM RBAC)
    set:
      rbac.create: false
    asserts:
      - hasDocuments:
          count: 0
        template: templates/clusterrolebinding.yaml

  - it: binds the ClusterRoleBinding to the chart-managed ClusterRole
    asserts:
      - hasDocuments:
          count: 1
        template: templates/clusterrolebinding.yaml
      - isKind:
          of: ClusterRoleBinding
        template: templates/clusterrolebinding.yaml
      - equal:
          path: roleRef.kind
          value: ClusterRole
        template: templates/clusterrolebinding.yaml
      - equal:
          path: roleRef.name
          value: ut-upcloud-ccm
        template: templates/clusterrolebinding.yaml

  # credentials.create + credentials.existingSecret mutex is enforced by the
  # `upcloud-ccm.validate` helper at template time (see _helpers.tpl). We
  # cover it with a `helm template` smoke test in charts-upcloud-lint.yml
  # because helm-unittest swallows `fail` errors across multi-template suites.
