# -- Global values, applied across every workload in this chart and
# composable with sibling Bitnami-style charts (e.g. `global.imageRegistry`).
global:
  # -- Override every `images.*.registry` (useful for air-gapped installs that
  # mirror images into a private registry such as Harbor).
  imageRegistry: ""
  # -- Appended to chart-level `imagePullSecrets`.
  imagePullSecrets: []

# -- Override the release namespace for every rendered resource.
# Defaults to `.Release.Namespace`; production clusters usually install
# into `kube-system`.
namespaceOverride: ""

# -- Common labels stamped onto every resource.
commonLabels: {}
# -- Common annotations stamped onto every resource.
commonAnnotations: {}

# -- Number of CCM controller replicas. The default of 2 + leader election
# tolerates a single control-plane failure without a re-sync gap.
replicaCount: 2

# -- Image-pull secrets for all containers (combined with `global.imagePullSecrets`).
imagePullSecrets: []

images:
  ccm:
    # -- Registry the CCM image is pulled from (overridden by `global.imageRegistry`).
    registry: ghcr.io
    # -- Repository within the registry.
    repository: upcloudltd/cloud-controller-manager
    # -- Tag. Empty string falls back to `.Chart.AppVersion`.
    tag: ""
    # -- Image digest (sha256:...). When set, takes precedence over `tag`
    # and yields `registry/repository@sha256:...`. Recommended for production.
    digest: ""
    # -- `IfNotPresent`, `Always`, or `Never`.
    pullPolicy: IfNotPresent

credentials:
  # -- Render a Secret with the supplied `username` / `password`.
  # Mutually exclusive with `existingSecret`.
  create: true
  # -- Reference an externally-managed Secret (e.g. one created by
  # External Secrets Operator or shared with the upcloud-csi chart).
  existingSecret: ""
  # -- Secret key holding the UpCloud API username.
  usernameKey: username
  # -- Secret key holding the UpCloud API password.
  passwordKey: password
  # -- UpCloud API username. Required when `create: true`.
  username: ""
  # -- UpCloud API password. Required when `create: true`.
  password: ""

ccmConfig:
  # -- Cluster identifier surfaced in UpCloud Hub (LoadBalancer names, tags).
  clusterName: "my-k3s-cluster"
  # -- Cluster ID, must be globally unique within your UpCloud account. REQUIRED.
  # Generate once with `uuidgen` and pin it in your values file.
  clusterID: ""
  # -- Default plan for LoadBalancers provisioned by the CCM.
  # Allowed: `development`, `production-small`, `production-medium`, `production-large`.
  loadBalancerPlan: "development"
  # -- Maximum backend members attached to a managed LoadBalancer.
  loadBalancerMaxBackendMembers: 100

serviceAccount:
  # -- Create a ServiceAccount. K3s only ships the `cloud-controller-manager`
  # SA when its embedded CCM is enabled; with `--disable-cloud-controller`
  # (the external-CCM setup this chart targets) the SA must be created here.
  create: true
  # -- Name of the SA to use (either created here or referenced).
  name: "cloud-controller-manager"
  # -- Extra annotations on the SA.
  annotations: {}
  # -- Mount the SA token automatically into pods. Required for CCM to talk
  # to the apiserver.
  automountServiceAccountToken: true

rbac:
  # -- Render a ClusterRole with the standard cloud-controller-manager
  # permissions plus a ClusterRoleBinding to the SA above. Required when the
  # cluster does not ship CCM RBAC of its own (e.g. K3s started with
  # `--disable-cloud-controller`, or vanilla Kubernetes).
  create: true

# -- PriorityClass for the CCM pods. `system-cluster-critical` ensures they
# evict last under pressure.
priorityClassName: system-cluster-critical

# -- Tolerations so the pod schedules on control-plane nodes and survives
# the `uninitialized` cloud-provider taint during cluster bootstrap.
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule
  - key: node.cloudprovider.kubernetes.io/uninitialized
    value: "true"
    effect: NoSchedule

# -- Pin the pod to control-plane nodes by default.
nodeSelector:
  node-role.kubernetes.io/control-plane: ""

# -- Soft anti-affinity to spread replicas across nodes when possible.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: upcloud-ccm

# -- Topology spread constraints (Kubernetes >= 1.27 supports `whenUnsatisfiable: ScheduleAnyway`).
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: upcloud-ccm

# -- Grace period before SIGKILL.
terminationGracePeriodSeconds: 60

# -- Restrict revision history to keep etcd lean.
revisionHistoryLimit: 3

# -- Rolling update strategy. `maxUnavailable: 0` keeps at least one CCM
# replica running during upgrades; combined with leader election this means
# no provisioning gap.
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# -- Pod-level security context. The CCM binary runs fine as nonroot.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL

# -- Resource requests & limits. Conservative defaults; bump for clusters
# managing many LoadBalancers / nodes.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# -- Extra environment variables for the CCM container.
extraEnv: []

# -- Extra volume mounts for the CCM container.
extraVolumeMounts: []

# -- Extra volumes for the pod.
extraVolumes: []

# -- Extra command-line flags appended after the chart-managed flags
# (chart flags win on conflicts because they appear first).
extraArgs: []

# -- Pod annotations.
podAnnotations: {}

# -- Pod labels (in addition to chart-managed labels).
podLabels: {}

# -- Pod Disruption Budget. Active when `replicaCount > 1`.
podDisruptionBudget:
  enabled: true
  # -- One of `minAvailable` / `maxUnavailable` must be set.
  minAvailable: 1
  maxUnavailable: ""

metrics:
  # -- Enable the CCM secure metrics endpoint. Required for `serviceMonitor`.
  enabled: true
  # -- CCM secure port. Metrics + healthz served here.
  port: 10258
  # -- Bind address for the secure serving port. Must be reachable from the
  # kubelet for the `/healthz` probes to pass; `127.0.0.1` would fail every
  # probe and crash-loop the pod. `0.0.0.0` is also switched on automatically
  # when `serviceMonitor.enabled` is true so Prometheus can scrape.
  bindAddress: "0.0.0.0"
  service:
    # -- Render a headless Service so Prometheus can discover the pods.
    # Auto-enabled when `serviceMonitor.enabled` is true.
    enabled: false
    annotations: {}
  serviceMonitor:
    # -- Opt-in: requires the Prometheus Operator CRDs to be installed.
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    namespace: ""
    labels: {}
    relabelings: []
    metricRelabelings: []
    # -- The CCM uses a self-signed cert on its secure port.
    tlsConfig:
      insecureSkipVerify: true
  # -- PodMonitor (alternative to ServiceMonitor — scrapes pods directly without
  # requiring a Service). Useful when running multiple replicas behind a headless
  # Service is undesirable.
  podMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    namespace: ""
    labels: {}
    relabelings: []
    metricRelabelings: []
    tlsConfig:
      insecureSkipVerify: true
  # -- PrometheusRule containing recommended alerts (CCM down, leader election
  # flapping, API errors, crash loop).
  prometheusRule:
    enabled: false
    namespace: ""
    labels: {}
    # -- Free-form list of extra `monitoring.coreos.com/v1` alert rules merged
    # into the rendered group. Use to add project-specific SLOs.
    extraRules: []
    alerts:
      ccmDown:
        for: 5m
        severity: critical
        runbookUrl: ""
        extraLabels: {}
      leaderElectionFlapping:
        for: 10m
        severity: warning
      apiErrors:
        for: 10m
        severity: warning
      crashLoop:
        for: 5m
        severity: critical

# -- Pre-canned Grafana dashboard rendered as a ConfigMap. Picked up by the
# kube-prometheus-stack Grafana sidecar via the configured label/value.
dashboard:
  enabled: false
  # -- Namespace for the ConfigMap. Defaults to the release namespace. Set this
  # to your Grafana namespace if the sidecar only watches a specific namespace.
  namespace: ""
  # -- Label key the Grafana sidecar selects on
  # (`--label`/`GF_SIDECAR_LABEL`). Default matches kube-prometheus-stack.
  label: grafana_dashboard
  # -- Value for the selector label.
  labelValue: "1"
  extraLabels: {}
  annotations: {}

# -- Built-in `helm test` pod that verifies the Deployment is healthy after
# install/upgrade. Runs `kubectl rollout status` against the CCM Deployment.
tests:
  enabled: true
  timeout: 120s
  image:
    registry: registry.k8s.io
    repository: kubectl
    tag: v1.31.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  nodeSelector: {}
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule

# -- Optional pod-level scheduling/runtime knobs. Apply across the CCM
# Deployment and the helm-test pod (where relevant).
hostAliases: []
# -- DNS overrides. Useful when the kube-apiserver is reached via a private
# DNS zone resolved by an internal nameserver.
dnsConfig: {}
# -- Force a specific runtime class (e.g. `gvisor`, `kata`).
runtimeClassName: ""
# -- Use a non-default scheduler (e.g. `volcano`, a profile defined in
# `KubeSchedulerConfiguration`). Empty string falls back to `default-scheduler`.
schedulerName: ""
# -- `OnRootMismatch` skips fsGroup ownership changes when the volume root
# already has the requested gid. Faster startup for large PVs.
fsGroupChangePolicy: OnRootMismatch
# -- `FallbackToLogsOnError` makes Kubernetes surface container logs when the
# container exits non-zero, instead of just `terminated` with no detail.
terminationMessagePolicy: FallbackToLogsOnError

# -- Logging verbosity (`--v=<n>` flag). 2 is upstream default.
logVerbosity: 2

# -- Disable Go pprof endpoints by default.
profiling: false

# -- Opt-in NetworkPolicy. Off by default because policies vary by CNI;
# turn on for compliance-heavy environments.
networkPolicy:
  enabled: false
  # -- Extra ingress rules merged with the default (allow Prometheus to scrape metrics).
  extraIngress: []
  # -- Extra egress rules merged with the default (allow DNS + UpCloud API + kube-apiserver).
  extraEgress: []

# -- Liveness probe — hits the CCM `/healthz` over HTTPS on the secure port.
livenessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: metrics
    scheme: HTTPS
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# -- Readiness probe — same endpoint, shorter initial delay.
readinessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: metrics
    scheme: HTTPS
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# -- Startup probe (off by default; CCM starts fast).
startupProbe:
  enabled: false
  httpGet:
    path: /healthz
    port: metrics
    scheme: HTTPS
  periodSeconds: 5
  failureThreshold: 12
