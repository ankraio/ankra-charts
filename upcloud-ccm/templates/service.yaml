{{- if or .Values.metrics.service.enabled .Values.metrics.serviceMonitor.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "upcloud-ccm.fullname" . }}-metrics
  namespace: {{ include "upcloud-ccm.namespace" . }}
  labels:
    {{- include "upcloud-ccm.labels" . | nindent 4 }}
    app.kubernetes.io/component: metrics
  {{- with .Values.metrics.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      protocol: TCP
      targetPort: metrics
  selector:
    {{- include "upcloud-ccm.selectorLabels" . | nindent 4 }}
{{- end }}
