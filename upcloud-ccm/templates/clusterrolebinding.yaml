{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "upcloud-ccm.fullname" . }}
  labels:
    {{- include "upcloud-ccm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:cloud-controller-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "upcloud-ccm.serviceAccountName" . }}
    namespace: {{ include "upcloud-ccm.namespace" . }}
{{- end }}
