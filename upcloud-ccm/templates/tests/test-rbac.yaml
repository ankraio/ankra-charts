{{- if .Values.tests.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "upcloud-ccm.fullname" . }}-test
  namespace: {{ include "upcloud-ccm.namespace" . }}
  labels:
    {{- include "upcloud-ccm.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "upcloud-ccm.fullname" . }}-test
  namespace: {{ include "upcloud-ccm.namespace" . }}
  labels:
    {{- include "upcloud-ccm.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "upcloud-ccm.fullname" . }}-test
  namespace: {{ include "upcloud-ccm.namespace" . }}
  labels:
    {{- include "upcloud-ccm.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "upcloud-ccm.fullname" . }}-test
subjects:
  - kind: ServiceAccount
    name: {{ include "upcloud-ccm.fullname" . }}-test
    namespace: {{ include "upcloud-ccm.namespace" . }}
{{- end }}
