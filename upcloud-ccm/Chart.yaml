apiVersion: v2
name: upcloud-ccm
description: UpCloud Cloud Controller Manager for Kubernetes - leader-elected, hardened, with built-in Prometheus alerts & Grafana dashboard.
type: application
version: 0.3.1
appVersion: "v1.2.3"
kubeVersion: ">=1.27.0-0"
icon: https://ankra.io/images/apple-touch-icon.png

home: https://github.com/ankraio/ankra-charts/tree/main/upcloud-ccm
sources:
  - https://github.com/ankraio/ankra-charts/tree/main/upcloud-ccm
  - https://upcloud.com/community/tutorials/getting-started-upcloud-kubernetes-services

keywords:
  - upcloud
  - ccm
  - cloud-controller-manager
  - cloud-provider
  - load-balancer
  - k3s
  - observability
  - prometheus
  - grafana

maintainers:
  - name: Ankra AB
    email: admin@ankra.io
    url: https://ankra.io

annotations:
  category: Infrastructure
  licenses: Apache-2.0
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: integration-delivery
  artifacthub.io/prerelease: "false"
  artifacthub.io/maintainers: |
    - name: Ankra AB
      email: admin@ankra.io
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/ankraio/ankra-charts
    - name: Helm repo (helm repo add)
      url: https://ankraio.github.io/ankra-charts
    - name: Upstream image (GHCR)
      url: https://ghcr.io/upcloudltd/cloud-controller-manager
    - name: Chart (OCI)
      url: oci://ghcr.io/ankraio/ankra-charts/upcloud-ccm
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/ankra-charts/upcloud-csi
  artifacthub.io/operator: "false"
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/images: |
    - name: cloud-controller-manager
      image: ghcr.io/upcloudltd/cloud-controller-manager:v1.2.1
    - name: kubectl-test-hook
      image: registry.k8s.io/kubectl:v1.31.0
      whitelisted: true
  artifacthub.io/changes: |
    - kind: fixed
      description: PodMonitor no longer emits an empty bearerTokenSecret; supply metrics.podMonitor.bearerTokenSecret to scrape the secure port.
    - kind: fixed
      description: helm test now runs under a dedicated least-privilege ServiceAccount + namespaced Role instead of the cluster-privileged CCM ServiceAccount.
    - kind: fixed
      description: Deployment honors serviceAccount.automountServiceAccountToken instead of hardcoding true.
    - kind: fixed
      description: --bind-address is forced to 0.0.0.0 when either ServiceMonitor or PodMonitor is enabled.
    - kind: changed
      description: README requirements/defaults corrected to reflect serviceAccount.create and rbac.create defaulting to true.
