suite: storage classes
templates:
  - templates/storageclasses.yaml
  - templates/volumesnapshotclass.yaml
release:
  name: ut
  namespace: kube-system
set:
  credentials.token: dop_v1_test

tests:
  - it: renders the four upstream StorageClasses
    template: templates/storageclasses.yaml
    asserts:
      - hasDocuments:
          count: 4
      - isKind:
          of: StorageClass

  - it: marks do-block-storage as the default class
    template: templates/storageclasses.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: do-block-storage
      - equal:
          path: metadata.annotations["storageclass.kubernetes.io/is-default-class"]
          value: "true"
      - equal:
          path: allowVolumeExpansion
          value: true

  - it: renders the retain class with a Retain reclaim policy
    template: templates/storageclasses.yaml
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.name
          value: do-block-storage-retain
      - equal:
          path: reclaimPolicy
          value: Retain
      - notExists:
          path: metadata.annotations["storageclass.kubernetes.io/is-default-class"]

  - it: renders the xfs classes with the fstype parameter
    template: templates/storageclasses.yaml
    documentIndex: 2
    asserts:
      - equal:
          path: metadata.name
          value: do-block-storage-xfs
      - equal:
          path: parameters.fstype
          value: xfs

  - it: allows moving the default annotation to another class
    template: templates/storageclasses.yaml
    set:
      storageClasses.defaultClass: do-block-storage-retain
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.annotations["storageclass.kubernetes.io/is-default-class"]
          value: "true"

  - it: renders no StorageClasses when disabled
    template: templates/storageclasses.yaml
    set:
      storageClasses.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the default VolumeSnapshotClass
    template: templates/volumesnapshotclass.yaml
    asserts:
      - isKind:
          of: VolumeSnapshotClass
      - equal:
          path: driver
          value: dobs.csi.digitalocean.com
      - equal:
          path: deletionPolicy
          value: Delete
      - equal:
          path: metadata.annotations["snapshot.storage.kubernetes.io/is-default-class"]
          value: "true"
