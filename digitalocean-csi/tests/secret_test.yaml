suite: secret
templates:
  - templates/secret.yaml
release:
  name: ut
  namespace: kube-system

tests:
  - it: renders the token under the access-token key
    set:
      credentials.token: dop_v1_test
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData["access-token"]
          value: dop_v1_test

  - it: renders nothing when credentials.create is false
    set:
      credentials.create: false
      credentials.existingSecret: digitalocean
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when create is true without a token
    asserts:
      - failedTemplate:
          errorMessage: "credentials.create=true requires credentials.token."

  - it: fails when create and existingSecret are both set
    set:
      credentials.token: dop_v1_test
      credentials.existingSecret: digitalocean
    asserts:
      - failedTemplate:
          errorMessage: "credentials.create and credentials.existingSecret are mutually exclusive."
