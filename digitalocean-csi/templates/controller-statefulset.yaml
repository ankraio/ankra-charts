{{- include "digitalocean-csi.validate" . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "digitalocean-csi.fullname" . }}-controller
  namespace: {{ include "digitalocean-csi.namespace" . }}
  labels:
    {{- include "digitalocean-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
  {{- with (include "digitalocean-csi.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  serviceName: {{ include "digitalocean-csi.fullname" . }}-controller
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "digitalocean-csi.controllerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: csi-do-plugin
        {{- if .Values.credentials.create }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.controller.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "digitalocean-csi.controllerSelectorLabels" . | nindent 8 }}
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "digitalocean-csi.imagePullSecrets" . | nindent 6 }}
      {{- with .Values.controller.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      serviceAccountName: {{ include "digitalocean-csi.fullname" . }}-controller-sa
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: csi-provisioner
          image: {{ include "digitalocean-csi.image" (dict "image" .Values.images.provisioner "context" .) }}
          imagePullPolicy: {{ .Values.images.provisioner.pullPolicy }}
          args:
            - "--csi-address=$(ADDRESS)"
            - "--default-fstype=ext4"
            - "--v={{ .Values.controller.logVerbosity }}"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          resources:
            {{- toYaml .Values.controller.sidecarResources | nindent 12 }}
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
        - name: csi-attacher
          image: {{ include "digitalocean-csi.image" (dict "image" .Values.images.attacher "context" .) }}
          imagePullPolicy: {{ .Values.images.attacher.pullPolicy }}
          args:
            - "--csi-address=$(ADDRESS)"
            - "--v={{ .Values.controller.logVerbosity }}"
            - "--reconcile-sync=30m"
            - "--timeout=2m"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          resources:
            {{- toYaml .Values.controller.sidecarResources | nindent 12 }}
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
        - name: csi-snapshotter
          image: {{ include "digitalocean-csi.image" (dict "image" .Values.images.snapshotter "context" .) }}
          imagePullPolicy: {{ .Values.images.snapshotter.pullPolicy }}
          args:
            - "--csi-address=$(ADDRESS)"
            - "--v={{ .Values.controller.logVerbosity }}"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          resources:
            {{- toYaml .Values.controller.sidecarResources | nindent 12 }}
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
        - name: csi-resizer
          image: {{ include "digitalocean-csi.image" (dict "image" .Values.images.resizer "context" .) }}
          imagePullPolicy: {{ .Values.images.resizer.pullPolicy }}
          args:
            - "--csi-address=$(ADDRESS)"
            - "--timeout=30s"
            - "--v={{ .Values.controller.logVerbosity }}"
            - "--handle-volume-inuse-error=false"
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          resources:
            {{- toYaml .Values.controller.sidecarResources | nindent 12 }}
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
        - name: csi-do-plugin
          image: {{ include "digitalocean-csi.image" (dict "image" .Values.images.csiDriver "context" .) }}
          imagePullPolicy: {{ .Values.images.csiDriver.pullPolicy }}
          args:
            - "--endpoint=$(CSI_ENDPOINT)"
            - "--token=$(DIGITALOCEAN_ACCESS_TOKEN)"
            - "--url=$(DIGITALOCEAN_API_URL)"
            - "--default-volumes-page-size={{ .Values.controller.defaultVolumesPageSize }}"
          env:
            - name: CSI_ENDPOINT
              value: unix:///var/lib/csi/sockets/pluginproxy/csi.sock
            - name: DIGITALOCEAN_API_URL
              value: {{ .Values.apiURL }}
            - name: DIGITALOCEAN_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "digitalocean-csi.secretName" . }}
                  key: {{ .Values.credentials.tokenKey }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
      volumes:
        - name: socket-dir
          emptyDir: {}
