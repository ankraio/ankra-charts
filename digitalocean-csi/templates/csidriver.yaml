apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: dobs.csi.digitalocean.com
  labels:
    {{- include "digitalocean-csi.labels" . | nindent 4 }}
  {{- with (include "digitalocean-csi.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  attachRequired: true
  podInfoOnMount: true
