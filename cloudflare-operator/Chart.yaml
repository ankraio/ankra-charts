apiVersion: v2
name: cloudflare-operator
description: |
  Helm chart for the community Cloudflare Operator
  (adyanth/cloudflare-operator) that reconciles Tunnel, ClusterTunnel,
  AccessTunnel and TunnelBinding CRDs against Cloudflare Zero Trust /
  Cloudflare Tunnel. Optionally renders a ClusterOriginIssuer for use with
  the cert-manager origin-ca-issuer.
type: application
version: 0.2.0
appVersion: "0.13.1"
kubeVersion: ">=1.27.0-0"
icon: https://ankra.io/images/apple-touch-icon.png

home: https://github.com/ankraio/ankra-charts/tree/main/cloudflare-operator
sources:
  - https://github.com/ankraio/ankra-charts/tree/main/cloudflare-operator
  - https://github.com/adyanth/cloudflare-operator

keywords:
  - cloudflare
  - cloudflare-tunnel
  - cloudflared
  - cloudflare-operator
  - cert-manager
  - origin-ca-issuer
  - zero-trust

maintainers:
  - name: Ankra AB
    email: admin@ankra.io
    url: https://ankra.io

dependencies: []

annotations:
  category: Networking
  licenses: Apache-2.0
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: networking
  artifacthub.io/prerelease: "false"
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/maintainers: |
    - name: Ankra AB
      email: admin@ankra.io
  artifacthub.io/operator: "true"
  artifacthub.io/operatorCapabilities: Basic Install
  artifacthub.io/images: |
    - name: cloudflare-operator
      image: docker.io/adyanth/cloudflare-operator:0.13.1
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/cert-manager/cert-manager
  artifacthub.io/crds: |
    - kind: Tunnel
      version: networking.cfargotunnel.com/v1alpha2
      name: tunnels.networking.cfargotunnel.com
      displayName: Cloudflare Tunnel
      description: Namespaced Cloudflare Tunnel reconciled by the operator.
    - kind: ClusterTunnel
      version: networking.cfargotunnel.com/v1alpha2
      name: clustertunnels.networking.cfargotunnel.com
      displayName: Cloudflare Cluster Tunnel
      description: Cluster-scoped Cloudflare Tunnel shared across namespaces.
    - kind: TunnelBinding
      version: networking.cfargotunnel.com/v1alpha1
      name: tunnelbindings.networking.cfargotunnel.com
      displayName: Cloudflare Tunnel Binding
      description: Binds Kubernetes Services to a Cloudflare Tunnel hostname.
    - kind: AccessTunnel
      version: networking.cfargotunnel.com/v1alpha1
      name: accesstunnels.networking.cfargotunnel.com
      displayName: Cloudflare Access Tunnel
      description: Cloudflare Zero Trust Access tunnel resource.
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/ankraio/ankra-charts
    - name: Helm repo (helm repo add)
      url: https://ankraio.github.io/ankra-charts
    - name: Upstream project
      url: https://github.com/adyanth/cloudflare-operator
    - name: Upstream documentation
      url: https://adyanth.github.io/cloudflare-operator/
    - name: Cloudflare Origin CA Issuer (cert-manager external issuer)
      url: https://github.com/cloudflare/origin-ca-issuer
    - name: Chart (OCI)
      url: oci://ghcr.io/ankraio/ankra-charts/cloudflare-operator
  artifacthub.io/changes: |
    - kind: fixed
      description: CRDs only carry the cert-manager.io/inject-ca-from annotation when webhook.certManager.enabled is true, so bring-your-own-TLS installs no longer wire CRDs to a non-existent Certificate.
    - kind: fixed
      description: The sample ClusterTunnel now renders a real accountId (sampleClusterTunnel.accountId, falling back to credentials.accountId) and validates that one is set.
    - kind: fixed
      description: Deployment honors serviceAccount.automountServiceAccountToken instead of hardcoding true.
    - kind: changed
      description: Added chart icon and ArtifactHub metadata parity (category, licenses, images, recommendations); corrected README/NOTES to state only ClusterTunnel uses a conversion webhook.
