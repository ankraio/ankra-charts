suite: credentials
templates:
  - templates/secret-cloudflare.yaml
  - templates/origin-issuer-secret.yaml
  - templates/origin-issuer.yaml
release:
  name: ut
  namespace: cloudflare-operator-system
chart:
  version: 0.1.0
  appVersion: "0.13.1"

tests:
  - it: skips Secret rendering when reusing an existing one (default)
    template: templates/secret-cloudflare.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the Cloudflare Secret when credentials.create is true
    template: templates/secret-cloudflare.yaml
    set:
      credentials.create: true
      credentials.existingSecret: ""
      credentials.apiToken: my-token
      credentials.accountId: my-account
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: cloudflare-secrets
      - equal:
          path: metadata.namespace
          value: cloudflare-operator-system
      - equal:
          path: type
          value: Opaque
      - equal:
          path: stringData.CLOUDFLARE_API_TOKEN
          value: my-token
      - equal:
          path: stringData.CLOUDFLARE_ACCOUNT_ID
          value: my-account

  - it: respects custom credentials.secretName
    template: templates/secret-cloudflare.yaml
    set:
      credentials.create: true
      credentials.existingSecret: ""
      credentials.apiToken: tok
      credentials.accountId: acc
      credentials.secretName: my-custom-cf-secret
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-cf-secret

  - it: does not render the Origin CA Secret by default
    template: templates/origin-issuer-secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the Origin CA Secret in cert-manager namespace when enabled
    template: templates/origin-issuer-secret.yaml
    set:
      originIssuer.enabled: true
      originIssuer.secret.create: true
      originIssuer.secret.existingSecret: ""
      originIssuer.secret.token: cf-origin-token
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: origin-ca-issuer-secret
      - equal:
          path: metadata.namespace
          value: cert-manager
      - equal:
          path: stringData.api-token
          value: cf-origin-token

  - it: renders the ClusterOriginIssuer CR pointing at the right Secret
    template: templates/origin-issuer.yaml
    set:
      originIssuer.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ClusterOriginIssuer
      - equal:
          path: metadata.name
          value: cloudflare-origin-issuer
      - equal:
          path: spec.requestType
          value: OriginECC
      - equal:
          path: spec.auth.tokenRef.name
          value: origin-ca-issuer-secret
      - equal:
          path: spec.auth.tokenRef.key
          value: api-token
