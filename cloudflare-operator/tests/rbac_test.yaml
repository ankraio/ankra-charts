suite: rbac
templates:
  - templates/serviceaccount.yaml
  - templates/rbac.yaml
  - templates/rbac-aggregate.yaml
release:
  name: ut
  namespace: cloudflare-operator-system
chart:
  version: 0.1.0
  appVersion: "0.13.1"

tests:
  - it: renders the ServiceAccount by default
    template: templates/serviceaccount.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: ut-cloudflare-operator-controller-manager
      - equal:
          path: metadata.namespace
          value: cloudflare-operator-system
      - equal:
          path: automountServiceAccountToken
          value: true

  - it: honors serviceAccount.name when explicitly set
    template: templates/serviceaccount.yaml
    set:
      serviceAccount.name: my-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-sa

  - it: skips the ServiceAccount when serviceAccount.create=false
    template: templates/serviceaccount.yaml
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders manager + leader-election + metrics RBAC in the right order/kinds
    template: templates/rbac.yaml
    asserts:
      - documentIndex: 0
        isKind:
          of: ClusterRole
      - documentIndex: 0
        equal:
          path: metadata.name
          value: ut-cloudflare-operator-manager
      - documentIndex: 1
        isKind:
          of: ClusterRoleBinding
      - documentIndex: 1
        equal:
          path: roleRef.name
          value: ut-cloudflare-operator-manager
      - documentIndex: 1
        equal:
          path: subjects[0].name
          value: ut-cloudflare-operator-controller-manager
      - documentIndex: 1
        equal:
          path: subjects[0].namespace
          value: cloudflare-operator-system
      - documentIndex: 2
        isKind:
          of: Role
      - documentIndex: 2
        equal:
          path: metadata.name
          value: ut-cloudflare-operator-leader-election
      - documentIndex: 3
        isKind:
          of: RoleBinding
      - documentIndex: 4
        equal:
          path: metadata.name
          value: ut-cloudflare-operator-metrics-auth
      - documentIndex: 6
        equal:
          path: metadata.name
          value: ut-cloudflare-operator-metrics-reader

  - it: grants the manager full CRUD on every tunnel CRD
    template: templates/rbac.yaml
    documentIndex: 0
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [networking.cfargotunnel.com]
            resources: [accesstunnels, clustertunnels, tunnelbindings, tunnels]
            verbs: [create, delete, get, list, patch, update, watch]

  - it: emits the 9 aggregate viewer/editor/admin ClusterRoles by default
    template: templates/rbac-aggregate.yaml
    asserts:
      - hasDocuments:
          count: 9

  - it: omits aggregate ClusterRoles when rbac.aggregateClusterRoles=false
    template: templates/rbac-aggregate.yaml
    set:
      rbac.aggregateClusterRoles: false
    asserts:
      - hasDocuments:
          count: 0

  - it: skips all manager/leader-election/metrics RBAC when rbac.create=false
    template: templates/rbac.yaml
    set:
      rbac.create: false
    asserts:
      - hasDocuments:
          count: 0
