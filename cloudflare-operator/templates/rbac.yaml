{{- if .Values.rbac.create -}}
---
# Manager ClusterRole - what the operator can do across the cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cloudflare-operator.fullname" . }}-manager
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [configmaps, secrets]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [services]
    verbs: [create, get, list, patch, update, watch]
  - apiGroups: [networking.cfargotunnel.com]
    resources: [accesstunnels, clustertunnels, tunnelbindings, tunnels]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [networking.cfargotunnel.com]
    resources:
      - accesstunnels/status
      - clustertunnels/status
      - tunnelbindings/status
      - tunnels/status
    verbs: [get, patch, update]
  - apiGroups: [networking.cfargotunnel.com]
    resources:
      - clustertunnels/finalizers
      - tunnelbindings/finalizers
      - tunnels/finalizers
    verbs: [update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cloudflare-operator.fullname" . }}-manager
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cloudflare-operator.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "cloudflare-operator.serviceAccountName" . }}
    namespace: {{ include "cloudflare-operator.namespace" . }}
---
# Leader-election Role - namespace-scoped, mirrors upstream.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cloudflare-operator.fullname" . }}-leader-election
  namespace: {{ include "cloudflare-operator.namespace" . }}
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cloudflare-operator.fullname" . }}-leader-election
  namespace: {{ include "cloudflare-operator.namespace" . }}
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cloudflare-operator.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "cloudflare-operator.serviceAccountName" . }}
    namespace: {{ include "cloudflare-operator.namespace" . }}
---
# Metrics authn/authz - required because the manager serves metrics secured
# by kube-rbac-proxy-style TokenReview / SubjectAccessReview.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cloudflare-operator.fullname" . }}-metrics-auth
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [authentication.k8s.io]
    resources: [tokenreviews]
    verbs: [create]
  - apiGroups: [authorization.k8s.io]
    resources: [subjectaccessreviews]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cloudflare-operator.fullname" . }}-metrics-auth
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cloudflare-operator.fullname" . }}-metrics-auth
subjects:
  - kind: ServiceAccount
    name: {{ include "cloudflare-operator.serviceAccountName" . }}
    namespace: {{ include "cloudflare-operator.namespace" . }}
---
# Metrics reader - bind manually to humans / Prometheus tokens.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cloudflare-operator.fullname" . }}-metrics-reader
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
rules:
  - nonResourceURLs: [/metrics]
    verbs: [get]
{{- end }}
