{{- if or .Values.metrics.service.enabled .Values.metrics.serviceMonitor.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloudflare-operator.fullname" . }}-metrics
  namespace: {{ include "cloudflare-operator.namespace" . }}
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
    app.kubernetes.io/subcomponent: metrics
  {{- with .Values.metrics.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ default "ClusterIP" .Values.metrics.service.type }}
  selector:
    {{- include "cloudflare-operator.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.metrics.port }}
      protocol: TCP
      targetPort: metrics
{{- end }}
