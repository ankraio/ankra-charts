    description: 'Helm chart for the community Cloudflare Operator (adyanth/cloudflare-operator)
      that reconciles Tunnel, ClusterTunnel, AccessTunnel and TunnelBinding CRDs against
      Cloudflare Zero Trust / Cloudflare Tunnel. Optionally renders a ClusterOriginIssuer
      for use with the cert-manager origin-ca-issuer. '
