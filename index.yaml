  upcloud-csi:
  - annotations:
      artifacthub.io/category: storage
      artifacthub.io/changes: |
        - kind: fixed
          description: Snapshot CronJob retention is now applied per source PVC (filtered on the upcloud-csi.ankra.io/source-pvc label) instead of namespace-wide, so retentionCount keeps N snapshots per volume.
        - kind: fixed
          description: PodMonitor now scrapes a real metrics port - enabling it wires the csi-provisioner sidecar --http-endpoint and a matching controller container port (the driver itself exposes no metrics).
        - kind: fixed
          description: Snapshot validation webhook ClusterRoleBinding now binds the controller ServiceAccount the Deployment actually runs as (was the unused node ServiceAccount).
        - kind: changed
          description: Added a chart icon, a helm repo add link, and the snapshot-validation-webhook/kubectl/busybox images to ArtifactHub metadata.
      artifacthub.io/containsSecurityUpdates: "false"
      artifacthub.io/images: |
        - name: upcloud-csi
          image: ghcr.io/upcloudltd/upcloud-csi:v1.4.0
        - name: csi-provisioner
          image: registry.k8s.io/sig-storage/csi-provisioner:v3.1.0
        - name: csi-attacher
          image: registry.k8s.io/sig-storage/csi-attacher:v3.4.0
        - name: csi-resizer
          image: registry.k8s.io/sig-storage/csi-resizer:v1.4.0
        - name: csi-snapshotter
