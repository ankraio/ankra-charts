  upcloud-ccm:
  - annotations:
      artifacthub.io/category: integration-delivery
      artifacthub.io/changes: |
        - kind: fixed
          description: PodMonitor no longer emits an empty bearerTokenSecret; supply metrics.podMonitor.bearerTokenSecret to scrape the secure port.
        - kind: fixed
          description: helm test now runs under a dedicated least-privilege ServiceAccount + namespaced Role instead of the cluster-privileged CCM ServiceAccount.
        - kind: fixed
          description: Deployment honors serviceAccount.automountServiceAccountToken instead of hardcoding true.
        - kind: fixed
          description: --bind-address is forced to 0.0.0.0 when either ServiceMonitor or PodMonitor is enabled.
        - kind: changed
          description: README requirements/defaults corrected to reflect serviceAccount.create and rbac.create defaulting to true.
      artifacthub.io/containsSecurityUpdates: "false"
      artifacthub.io/images: |
        - name: cloud-controller-manager
          image: ghcr.io/upcloudltd/cloud-controller-manager:v1.2.1
        - name: kubectl-test-hook
          image: registry.k8s.io/kubectl:v1.31.0
          whitelisted: true
      artifacthub.io/license: Apache-2.0
      artifacthub.io/links: |
