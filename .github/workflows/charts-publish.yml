name: charts-publish

# Package Helm charts and push them to GHCR as OCI artifacts.
#
# Published as:
#   oci://ghcr.io/ankraio/ankra-charts/<chart>:<version>
#
# Each chart is published independently; pushing the same chart+version twice
# is treated as a no-op (the step checks GHCR before packaging).

on:
  push:
    branches: [main]
    paths:
      - "upcloud-ccm/**"
      - "upcloud-csi/**"
      - "cloudflare-operator/**"
      - "psono/**"
      - ".github/workflows/charts-publish.yml"
  workflow_dispatch:
    inputs:
      force:
        description: "Re-push even if the version already exists in GHCR"
        type: boolean
        default: false

concurrency:
  group: charts-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  OCI_REGISTRY: ghcr.io/${{ github.repository_owner }}/ankra-charts

jobs:
  publish:
    name: publish ${{ matrix.chart }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        chart: [upcloud-ccm, upcloud-csi, cloudflare-operator, psono]
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Read chart metadata
        id: meta
        run: |
          set -euo pipefail
          chart="${{ matrix.chart }}"
          version="$(grep -E '^version:' "${chart}/Chart.yaml" | awk '{print $2}' | tr -d '"')"
          name="$(grep -E '^name:' "${chart}/Chart.yaml" | awk '{print $2}' | tr -d '"')"
          echo "chart_name=${name}" >> "$GITHUB_OUTPUT"
          echo "chart_version=${version}" >> "$GITHUB_OUTPUT"
          echo "oci_ref=oci://${OCI_REGISTRY}/${name}:${version}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${chart} -> ${name}:${version}"

      - name: Log in to GHCR
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Check if version already exists
        id: exists
        run: |
          set -euo pipefail
          name="${{ steps.meta.outputs.chart_name }}"
          version="${{ steps.meta.outputs.chart_version }}"
          force="${{ github.event.inputs.force || 'false' }}"
          if [[ "${force}" == "true" ]]; then
            echo "force=true; will push regardless"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Try to pull the OCI ref headers; succeeds only if the tag exists.
          if helm show chart "oci://${OCI_REGISTRY}/${name}" --version "${version}" \
               > /dev/null 2>&1; then
            echo "::notice::${name}:${version} already published; skipping. Bump version: in Chart.yaml to publish a new release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "${name}:${version} not yet published; proceeding"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: helm lint
        if: steps.exists.outputs.skip == 'false'
        run: |
          set -euo pipefail
          case "${{ matrix.chart }}" in
            upcloud-ccm)
              helm lint "${{ matrix.chart }}" \
                --set ccmConfig.clusterID=ci-test \
                --set credentials.username=ci \
                --set credentials.password=ci
              ;;
            psono)
              helm lint "${{ matrix.chart }}" \
                --set base_url=https://psono.example.com \
                --set domain=example.com
              ;;
            *)
              helm lint "${{ matrix.chart }}"
              ;;
          esac

      - name: Package and push to GHCR (OCI)
        if: steps.exists.outputs.skip == 'false'
        run: |
          set -euo pipefail
          mkdir -p /tmp/packages
          pkg="$(helm package "${{ matrix.chart }}" --destination /tmp/packages \
                  | awk '{print $NF}')"
          echo "Packaged ${pkg}"
          helm push "${pkg}" "oci://${OCI_REGISTRY}"

      - name: Summary
        if: always()
        run: |
          {
            echo "### \`${{ steps.meta.outputs.chart_name }}\` @ \`${{ steps.meta.outputs.chart_version }}\`"
            echo
            if [[ "${{ steps.exists.outputs.skip }}" == "true" ]]; then
              echo "Already published — skipped."
            else
              echo "Published \`${{ steps.meta.outputs.oci_ref }}\`."
              echo
              echo '```bash'
              echo "helm install ${{ steps.meta.outputs.chart_name }} \\"
              echo "  ${{ steps.meta.outputs.oci_ref }} \\"
              echo "  --version ${{ steps.meta.outputs.chart_version }}"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
