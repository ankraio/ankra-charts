name: charts-cloudflare-operator-sync

on:
  schedule:
    - cron: "27 6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Override upstream version (e.g. v0.13.1). Default: latest from GitHub releases."
        type: string
        required: false

concurrency:
  group: charts-cloudflare-operator-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Install yq + crane
        run: |
          set -euo pipefail
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
          CRANE_VERSION=v0.20.2
          curl -fsSL -o /tmp/crane.tar.gz \
            "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz"
          sudo tar -xzf /tmp/crane.tar.gz -C /usr/local/bin crane
          crane version

      - name: Run sync
        id: sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          rc=0
          ./scripts/sync-upstream.sh cloudflare "${INPUT_VERSION}" || rc=$?
          echo "exit_code=${rc}" >> "$GITHUB_OUTPUT"
          if [[ "${rc}" != "0" && "${rc}" != "2" ]]; then
            exit "${rc}"
          fi

      - name: Detect changes
        id: changes
        run: |
          set -euo pipefail
          if git diff --quiet --exit-code; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      - name: Helm lint (pre-PR sanity check)
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          helm lint cloudflare-operator
          helm template ci-render cloudflare-operator \
            --namespace cloudflare-operator-system \
            --set credentials.existingSecret=cloudflare-secrets > /tmp/cf-render.yaml
          grep -q 'kind: CustomResourceDefinition' /tmp/cf-render.yaml
          grep -q 'kind: Deployment' /tmp/cf-render.yaml

      - name: Run helm-unittest (if changes touched templates)
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          if ! helm plugin list | awk '{print $1}' | grep -qx unittest; then
            helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.5.2
          fi
          helm unittest cloudflare-operator

      - name: Compose PR body
        if: steps.changes.outputs.has_changes == 'true'
        id: pr_body
        run: |
          set -euo pipefail
          rc="${{ steps.sync.outputs.exit_code || '0' }}"
          app=$(grep -E '^appVersion:' cloudflare-operator/Chart.yaml | awk '{print $2}' | tr -d '"')
          {
            echo "Automated sync of \`cloudflare-operator\` against upstream"
            echo "[adyanth/cloudflare-operator](https://github.com/adyanth/cloudflare-operator/releases)."
            echo
            echo "| Chart | Current appVersion | Sync exit code | Source |"
            echo "|---|---|---|---|"
            echo "| cloudflare-operator | \`${app}\` | \`${rc}\` | https://github.com/adyanth/cloudflare-operator/releases/tag/v${app} |"
            echo
            if [[ "${rc}" == "2" ]]; then
              echo "**Structural change detected** — vendored \`cloudflare-operator.yaml\` changed in ways"
              echo "beyond image tags / digests (e.g. new RBAC rule, new container, deleted resource)."
              echo "**Manual review required** before merging."
              echo
            else
              echo "Tag-only diff (or no diff at all beyond image digests) — safe to auto-merge once CI is green."
              echo
            fi
            echo "Generated by [\`charts-cloudflare-operator-sync.yml\`](./.github/workflows/charts-cloudflare-operator-sync.yml) on $(date -u +%Y-%m-%dT%H:%M:%SZ)."
          } > /tmp/pr-body.md
          echo "body_path=/tmp/pr-body.md" >> "$GITHUB_OUTPUT"
          labels="automated,dependencies,cloudflare"
          if [[ "${rc}" == "2" ]]; then
            labels="${labels},needs-review"
          fi
          echo "labels=${labels}" >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore(cloudflare-operator): sync to upstream

            Automated bump produced by .github/workflows/charts-cloudflare-operator-sync.yml.
          branch: chore/charts-cloudflare-operator-sync
          delete-branch: true
          title: "chore(cloudflare-operator): sync to upstream adyanth/cloudflare-operator"
          body-path: ${{ steps.pr_body.outputs.body_path }}
          labels: ${{ steps.pr_body.outputs.labels }}
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

      - name: No-op summary
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "cloudflare-operator chart is already up to date with upstream. Nothing to PR."
