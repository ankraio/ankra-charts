name: charts-pages

# Publish the charts as a classic HTTP Helm repository on GitHub Pages so that
# `helm repo add ankra https://ankraio.github.io/ankra-charts` works, and so
# ArtifactHub can index the repo and auto-track new versions.
#
# Hand-rolled (rather than helm/chart-releaser-action) because the charts live
# at the repo root rather than under a single `charts/` directory. Idempotent:
# re-running with an already-published chart+version is a no-op. Chart
# directories are discovered automatically via scripts/discover-charts.sh.

on:
  push:
    branches: [main]
    paths:
      - "*/Chart.yaml"
      - "*/values.yaml"
      - "*/templates/**"
      - "*/tests/**"
      - "scripts/discover-charts.sh"
      - "scripts/artifacthub-sync-repo.sh"
      - ".github/artifacthub-repo.yml"
      - ".github/workflows/charts-pages.yml"
  workflow_dispatch:

concurrency:
  group: charts-pages
  cancel-in-progress: false

permissions:
  contents: write

env:
  PAGES_URL: https://ankraio.github.io/ankra-charts
  ARTIFACTHUB_ORG: ankra
  ARTIFACTHUB_REPO_NAME: ankra-charts
  ARTIFACTHUB_REPO_DISPLAY_NAME: Ankra Charts

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Discover chart directories
        id: charts
        run: |
          set -euo pipefail
          mapfile -t chart_directories < <(bash scripts/discover-charts.sh)
          if [[ "${#chart_directories[@]}" -eq 0 ]]; then
            echo "No chart directories found." >&2
            exit 1
          fi
          printf '%s\n' "${chart_directories[@]}"
          {
            printf 'charts<<EOF\n'
            printf '%s\n' "${chart_directories[@]}"
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint and package charts
        run: |
          set -euo pipefail
          mkdir -p .cr-packages
          while IFS= read -r chart; do
            [[ -n "${chart}" ]] || continue
            if [[ "${chart}" == "upcloud-ccm" ]]; then
              helm lint "${chart}" \
                --set ccmConfig.clusterID=ci \
                --set credentials.username=ci \
                --set credentials.password=ci
            else
              helm lint "${chart}"
            fi
            helm package "${chart}" --destination .cr-packages
          done <<< "${{ steps.charts.outputs.charts }}"

      - name: Update the Pages Helm repo index
        run: |
          set -euo pipefail
          cp -f .cr-packages/*.tgz gh-pages/
          helm repo index gh-pages --url "${PAGES_URL}" --merge gh-pages/index.yaml

      - name: Ensure ArtifactHub metadata file exists
        run: |
          set -euo pipefail
          if [[ ! -f gh-pages/artifacthub-repo.yml ]]; then
            cp .github/artifacthub-repo.yml gh-pages/artifacthub-repo.yml
          fi
          if [[ ! -f gh-pages/index.html ]]; then
            printf '%s\n' \
              '<!DOCTYPE html>' \
              '<html lang="en">' \
              '  <head><meta charset="utf-8"><title>Ankra Charts</title></head>' \
              '  <body><p>Ankra Helm charts. Use <code>helm repo add ankra https://ankraio.github.io/ankra-charts</code>.</p></body>' \
              '</html>' \
              > gh-pages/index.html
          fi

      - name: Register or sync ArtifactHub repository
        env:
          ARTIFACTHUB_API_KEY_ID: ${{ secrets.ARTIFACTHUB_API_KEY_ID }}
          ARTIFACTHUB_API_KEY_SECRET: ${{ secrets.ARTIFACTHUB_API_KEY_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${ARTIFACTHUB_API_KEY_ID}" || -z "${ARTIFACTHUB_API_KEY_SECRET}" ]]; then
            echo "ArtifactHub API secrets not configured; skipping registration."
            exit 0
          fi
          bash scripts/artifacthub-sync-repo.sh gh-pages

      - name: Commit and push to gh-pages
        run: |
          set -euo pipefail
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet --exit-code; then
            echo "No chart index changes to publish."
            exit 0
          fi
          git add -A
          git commit -m "chore(charts): publish to Pages Helm repo [skip ci]"
          git push origin gh-pages

      - name: Claim ArtifactHub repository ownership
        env:
          ARTIFACTHUB_API_KEY_ID: ${{ secrets.ARTIFACTHUB_API_KEY_ID }}
          ARTIFACTHUB_API_KEY_SECRET: ${{ secrets.ARTIFACTHUB_API_KEY_SECRET }}
          ARTIFACTHUB_ACTION: claim
        run: |
          set -euo pipefail
          if [[ -z "${ARTIFACTHUB_API_KEY_ID}" || -z "${ARTIFACTHUB_API_KEY_SECRET}" ]]; then
            echo "ArtifactHub API secrets not configured; skipping ownership claim."
            exit 0
          fi
          bash scripts/artifacthub-sync-repo.sh gh-pages

      - name: Summary
        if: always()
        run: |
          {
            echo "### Helm repo (GitHub Pages)"
            echo
            echo '```bash'
            echo "helm repo add ankra ${PAGES_URL}"
            echo "helm repo update"
            echo "helm search repo ankra"
            echo '```'
            echo
            echo "Configure \`ARTIFACTHUB_API_KEY_ID\` and \`ARTIFACTHUB_API_KEY_SECRET\` repository secrets to auto-register on ArtifactHub."
          } >> "$GITHUB_STEP_SUMMARY"
