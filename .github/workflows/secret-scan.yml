name: secret-scan

# Scan the full git history and working tree for committed secrets — API
# tokens, private keys, passwords, cloud credentials — with gitleaks.
#
# This runs the MIT-licensed gitleaks *binary* directly (pinned, downloaded
# from the GitHub release, exactly like kubeconform/crane/yq elsewhere in
# this repo) rather than the `gitleaks-action` wrapper, which requires a
# paid license for organization-owned repositories.
#
# Config lives in `.gitleaks.toml`; confirmed false positives go in
# `.gitleaksignore` (by fingerprint). Run locally with:
#   gitleaks git . --redact --verbose

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly full-history sweep, in case a secret slips in via a path or
    # branch that never triggered the PR/push run.
    - cron: "13 6 * * 1"
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITLEAKS_VERSION: "8.30.1"
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the scan covers every commit, not just the tip.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          sudo tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks scan (full history)
        id: scan
        run: |
          set -euo pipefail
          # --redact keeps any matched secret out of the CI logs and report.
          # Picks up ./.gitleaks.toml and ./.gitleaksignore automatically.
          gitleaks git . \
            --redact \
            --verbose \
            --no-banner \
            --report-format sarif \
            --report-path /tmp/gitleaks.sarif

      - name: Upload gitleaks report
        # Keep the machine-readable report around when the scan trips, so a
        # maintainer can locate the finding (path/line/commit) and rotate.
        if: failure() && steps.scan.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: /tmp/gitleaks.sarif
          if-no-files-found: ignore
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          {
            if [[ "${{ steps.scan.outcome }}" == "success" ]]; then
              echo "### ✅ gitleaks: no secrets detected"
            else
              echo "### ❌ gitleaks: potential secret(s) detected"
              echo
              echo "See the failed step's log for the redacted finding(s)."
              echo
              echo "- **Real secret?** Rotate/revoke it immediately, then purge it from history."
              echo "- **False positive?** Add the printed \`Fingerprint\` to \`.gitleaksignore\`,"
              echo "  or extend the allowlist in \`.gitleaks.toml\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
